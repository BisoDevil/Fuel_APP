<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        /* iPhone Status Bar */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;

            pointer-events: none;
        }

        .status-bar-dark {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
        }

        .status-bar-time {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.2px;
        }

        .status-bar-dark .status-bar-time {
            color: #fff;
        }

        .status-bar-icons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Signal Bars */
        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 12px;
        }

        .signal-bar {
            width: 2.5px;
            background-color: #000;
            border-radius: 0.5px;
        }

        .signal-bar:nth-child(1) {
            height: 4px;
        }

        .signal-bar:nth-child(2) {
            height: 6px;
        }

        .signal-bar:nth-child(3) {
            height: 8px;
        }

        .signal-bar:nth-child(4) {
            height: 12px;
        }

        .status-bar-dark .signal-bar {
            background-color: #fff;
        }

        /* WiFi Icon */
        .wifi-icon {
            width: 14px;
            height: 10px;
            position: relative;
        }

        .wifi-icon svg {
            width: 100%;
            height: 100%;
        }

        /* Battery Icon */
        .battery-icon {
            width: 22px;
            height: 11px;
            border: 1px solid #000;
            border-radius: 2.5px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -2.5px;
            top: 50%;
            transform: translateY(-50%);
            width: 1.5px;
            height: 4px;
            background-color: #000;
            border-radius: 0 1px 1px 0;
        }

        .status-bar-dark .battery-icon {
            border-color: #fff;
        }

        .status-bar-dark .battery-icon::after {
            background-color: #fff;
        }

        .battery-level {
            height: 100%;
            background-color: #000;
            border-radius: 1px;
            width: 75%;
        }

        .status-bar-dark .battery-level {
            background-color: #fff;
        }

        /* Content container - starts below status bar */
        .content-container {
            height: 100%;
            padding-top: 44px;
            overflow-y: auto;
            position: relative;
        }
    </style>

</head>

<body class="flex items-center justify-center min-h-screen p-4 ">

    <!-- Mobile Frame -->
    <div
        class="w-full max-w-[420px] h-[884px] bg-[#f8f8fa] rounded-[60px] shadow-[0_40px_100px_rgba(0,0,0,0.08)] border-[12px] border-[#1a1a2e] overflow-hidden relative">

        <!-- Dynamic Island Placeholder -->
        <div class="absolute top-2 left-1/2 -translate-x-1/2 w-32 h-9 bg-black rounded-3xl z-[110]"></div>

        <!-- iPhone Status Bar -->
        <div class="status-bar " id="statusBar">
            <span class="status-bar-time" id="statusTime">9:41</span>
            <div class="status-bar-icons">
                <!-- Signal Bars -->
                <div class="signal-bars">
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                </div>
                <!-- WiFi Icon -->
                <div class="wifi-icon">
                    <svg viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M8 2.5C10.5 2.5 12.7 3.5 14.4 5L15.5 3.5C13.4 1.7 10.8 0.5 8 0.5C5.2 0.5 2.6 1.7 0.5 3.5L1.6 5C3.3 3.5 5.5 2.5 8 2.5Z"
                            fill="#000" />
                        <path
                            d="M8 6.5C9.5 6.5 10.9 7.1 12 8L13.2 6.5C11.7 5.2 9.9 4.5 8 4.5C6.1 4.5 4.3 5.2 2.8 6.5L4 8C5.1 7.1 6.5 6.5 8 6.5Z"
                            fill="#000" />
                        <path
                            d="M8 10.5C8.8 10.5 9.6 10.8 10.2 11.3L11.5 9.8C10.5 8.9 9.3 8.5 8 8.5C6.7 8.5 5.5 8.9 4.5 9.8L5.8 11.3C6.4 10.8 7.2 10.5 8 10.5Z"
                            fill="#000" />
                    </svg>
                </div>
                <!-- Battery Icon -->
                <div class="battery-icon">
                    <div class="battery-level"></div>
                </div>
            </div>
        </div>

        <!-- Content scrollable container -->
        <div class="content-container nautical-lines">
            <iframe class="w-full h-full" src="screens/1-intro/intro_1.html" frameborder="0"></iframe>
        </div>

    </div>

    <script>
        // Update time dynamically
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('statusTime').textContent = `${hours}:${minutes}`;
        }

        updateTime();
        setInterval(updateTime, 1000);

        // Detect dark mode from iframe content and update status bar
        const iframe = document.querySelector('iframe');
        iframe.onload = function () {
            // Try to detect if iframe content has dark class
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                            const isDark = iframeDoc.body.classList.contains('dark');
                            const statusBar = document.getElementById('statusBar');
                            if (isDark) {
                                statusBar.classList.add('status-bar-dark');
                            } else {
                                statusBar.classList.remove('status-bar-dark');
                            }
                        }
                    });
                });

                observer.observe(iframeDoc.body, { attributes: true });
            } catch (e) {
                // Cross-origin restriction, ignore
            }
        };
    </script>

</body>

</html>

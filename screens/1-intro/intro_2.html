<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark nautical-lines flex items-center justify-center min-h-screen h-[810px]">
    <div
        class="relative w-full max-w-md h-full bg-white dark:bg-[#1a0b0b] overflow-hidden flex flex-col nautical-lines">

        <div class="flex justify-end px-8 pt-2 z-30">
            <button
                class="text-gray-400 dark:text-gray-500 text-sm font-medium hover:text-primary transition-colors font-display">Skip</button>
        </div>
        <div class="flex-1 flex flex-col px-8 ">
            <div class="mb-12">
                <h1
                    class="text-4xl font-extrabold text-gray-900 dark:text-white font-display leading-tight tracking-tight">
                    Marine<br />
                    <span class="text-primary">Marketplace</span>
                </h1>
                <div class="w-12 h-1 bg-primary mt-4 rounded-full"></div>
            </div>
            <div class="flex-1 flex relative">
                <div class="w-1/2 pr-4 z-10">
                    <p class="text-gray-600 dark:text-gray-400 font-display text-base leading-relaxed">
                        Access a curated collection of yachts for rent, sale, and high-end accessories tailored for your
                        lifestyle.
                    </p>
                    <div
                        class="mt-16 flex items-center text-primary font-semibold text-xs tracking-widest uppercase font-display">
                        <span>Swipe to explore</span>
                        <span class="material-symbols-outlined ml-2 text-base">east</span>
                    </div>
                </div>
                <div class="w-1/2 relative h-full">
                    <div
                        class="absolute left-0 top-8 w-28 h-28 bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden transform rotate-[3deg] z-20 border border-gray-100 dark:border-gray-700 cursor-pointer hover:scale-105 transition-transform duration-200">
                        <img alt="Yacht Model" class="w-full h-full object-cover"
                            src="https://www.airhead.com/cdn/shop/products/54-2010.jpg?v=1571716284" />
                    </div>
                    <div
                        class="absolute right-0 top-40 w-28 h-28 bg-white dark:bg-black rounded-2xl shadow-xl overflow-hidden transform rotate-[-7deg] z-30 cursor-pointer hover:scale-105 transition-transform duration-200">
                        <img alt="Leather Steering Wheel" class="w-full h-full object-cover scale-110"
                            src="https://m.media-amazon.com/images/I/71bUTpr7g-L.jpg" />
                    </div>
                    <div
                        class="absolute left-0 top-72 w-28 h-28 bg-gray-50 dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden transform rotate-[12deg] z-10 border border-gray-100 dark:border-gray-700 cursor-pointer hover:scale-105 transition-transform duration-200">
                        <div class="w-full h-full flex items-center justify-center p-3 bg-white">
                            <img alt="Luxury Watch" class="w-16 h-16 object-contain"
                                src="https://m.media-amazon.com/images/I/71aCFCdkViL._AC_UF1000,1000_QL80_.jpg" />
                        </div>
                        <div class="absolute top-2 right-2 w-2 h-2 rounded-full bg-primary animate-pulse"></div>
                    </div>
                    <div
                        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-red-500/10 rounded-full blur-3xl -z-10">
                    </div>
                </div>
            </div>
            <div class="pb-8 pt-4 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-200 dark:bg-gray-800"></div>
                    <div class="w-6 h-1.5 rounded-full bg-primary"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-200 dark:bg-gray-800"></div>
                </div>
                <div class="relative">
                    <a href="intro_3.html"
                        class="w-20 h-20 bg-white dark:bg-[#1a0b0b] rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(0,0,0,0.1)] border border-gray-100 dark:border-white/5 active:scale-90 transition-transform group">
                        <div
                            class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-red-500/40">
                            <span class="material-symbols-outlined text-white text-3xl font-bold">arrow_forward</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../_src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark nautical-lines flex items-center justify-center min-h-screen h-[810px]">
    <div
        class="relative w-full max-w-md h-full bg-white dark:bg-[#1a0b0b] overflow-hidden flex flex-col nautical-lines">

        <div class="flex justify-end px-8 pt-2 z-30">
            <button
                class="text-gray-400 dark:text-gray-500 text-sm font-medium hover:text-primary transition-colors font-display">Skip</button>
        </div>
        <div class="flex-1 flex flex-col px-8">
            <div class="mb-12">
                <h1
                    class="text-4xl font-extrabold text-gray-900 dark:text-white font-display leading-tight tracking-tight">
                    Seamless <br />
                    <span class="text-primary">Logistics</span>
                </h1>
                <div class="w-12 h-1 bg-primary mt-4 rounded-full"></div>
            </div>
            <div class="flex-1 flex relative">
                <div class="w-1/2 pr-4 z-10">
                    <p class="text-gray-500 dark:text-gray-400 font-display text-base leading-relaxed">
                        Schedule fuel refueling and maintenance services directly to your dock. Experience on-demand
                        delivery for all your maritime needs.
                    </p>
                    <div
                        class="mt-16 flex items-center text-primary font-semibold text-xs tracking-widest uppercase font-display">
                        <span>Swipe to explore</span>
                        <span class="material-symbols-outlined ml-2 text-base">east</span>
                    </div>
                </div>
                <div class="w-1/2 relative h-full">
                    <div
                        class="absolute right-0 top-0 w-32 h-32 bg-gray-50 dark:bg-gray-800 rounded-3xl shadow-xl flex items-center justify-center transform -rotate-12 border border-gray-100 dark:border-gray-700 opacity-80 overflow-hidden">
                        <span class="material-symbols-outlined text-gray-400 text-5xl"
                            style="font-variation-settings: 'wght' 200;">package_2</span>
                        <div class="absolute bottom-0 left-0 w-full h-1 bg-primary"></div>
                    </div>
                    <div
                        class="absolute -left-4 top-20 w-36 h-36 bg-white dark:bg-gray-800 rounded-3xl shadow-2xl flex items-center justify-center transform rotate-6 z-10 border border-gray-100 dark:border-gray-700">
                        <div class="relative w-full h-full flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-6xl "
                                style="font-variation-settings: 'FILL' 1, 'wght' 400;">ev_station</span>
                            <div class="absolute top-2 right-2 w-4 h-4 rounded-full bg-red-100 dark:bg-red-900/30">
                            </div>
                        </div>
                    </div>
                    <div
                        class="absolute right-2 top-48 w-28 h-28 bg-gray-900 dark:bg-black rounded-3xl shadow-2xl flex items-center justify-center transform -rotate-3 z-20 border border-white/10">
                        <span class="material-symbols-outlined text-white text-4xl"
                            style="font-variation-settings: 'FILL' 0, 'wght' 300;">construction</span>
                    </div>
                    <div
                        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-red-500/10 rounded-full blur-3xl -z-10">
                    </div>
                </div>
            </div>
            <div class="pb-8 pt-4 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-1.5 rounded-full bg-primary"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-200 dark:bg-gray-800"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-200 dark:bg-gray-800"></div>
                </div>
                <div class="relative">
                    <a href="intro_2.html"
                        class="w-20 h-20 bg-white dark:bg-[#1a0b0b] rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(0,0,0,0.1)] border border-gray-100 dark:border-white/5 active:scale-90 transition-transform group">
                        <div
                            class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-red-500/40">
                            <span class="material-symbols-outlined text-white text-3xl font-bold">arrow_forward</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>

    </div>

</body>

</html>

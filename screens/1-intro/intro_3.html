<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../_src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-100 h-screen w-full flex justify-center items-center overflow-hidden">
    <!-- Phone Container -->
    <div
        class="w-full h-full max-w-md bg-background-light dark:bg-background-dark relative flex flex-col shadow-2xl overflow-hidden">
        <!-- Top Bar (Simulated) -->
        <div class="absolute top-0 w-full p-6 z-20 flex justify-end">

        </div>
        <!-- Main Visual Content: Nautical Chart & Widgets -->
        <div class="relative flex-1 w-full overflow-hidden nautical-pattern group">
            <!-- Abstract Map Shapes (Landmasses) -->
            <div
                class="absolute top-[-10%] right-[-20%] w-[80%] h-[60%] bg-blue-50 dark:bg-slate-800/30 rounded-full blur-3xl opacity-60">
            </div>
            <div
                class="absolute bottom-[20%] left-[-10%] w-[60%] h-[50%] bg-blue-50 dark:bg-slate-800/30 rounded-full blur-3xl opacity-60">
            </div>
            <!-- The Nautical Chart SVG representation -->
            <svg class="absolute inset-0 w-full h-full opacity-60 pointer-events-none" viewbox="0 0 400 800"
                xmlns="http://www.w3.org/2000/svg">
                <!-- Depth lines -->
                <path class="dark:stroke-slate-600" d="M-50,200 Q100,250 200,150 T450,100" fill="none" stroke="#94a3b8"
                    stroke-dasharray="4 4" stroke-width="1"></path>
                <path class="dark:stroke-slate-600" d="M-50,300 Q120,350 220,250 T450,200" fill="none" stroke="#94a3b8"
                    stroke-dasharray="4 4" stroke-width="1"></path>
                <!-- Coastline -->
                <path class="dark:stroke-slate-700" d="M450,400 Q300,450 250,600 T-50,700" fill="none" stroke="#cbd5e1"
                    stroke-width="2"></path>
                <!-- The Route Path (Glowing Red) -->
                <path class="shadow-glow drop-shadow-[0_0_8px_rgba(245,0,0,0.6)]"
                    d="M80,650 C120,550 150,580 200,450 S320,250 350,150" fill="none" stroke="#f50000"
                    stroke-linecap="round" stroke-width="3"></path>
                <!-- Waypoints -->
                <circle cx="80" cy="650" fill="white" r="4" stroke="#f50000" stroke-width="3"></circle>
                <circle cx="200" cy="450" fill="white" r="3" stroke="#f50000" stroke-width="2"></circle>
                <circle class="animate-pulse" cx="350" cy="150" fill="#f50000" r="6" stroke="white" stroke-width="3">
                </circle>
            </svg>
            <!-- Floating Weather Widget 1: Temperature -->
            <div
                class="absolute top-[20%] left-6 glass-widget p-3 rounded-xl shadow-soft flex items-center gap-3 animate-[float_6s_ease-in-out_infinite]">
                <div
                    class="w-10 h-10 rounded-lg bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-500">
                    <span class="material-icons text-xl">wb_sunny</span>
                </div>
                <div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wide">Temp</p>
                    <p class="text-lg font-bold text-gray-800 dark:text-white">24°C</p>
                </div>
            </div>
            <!-- Floating Weather Widget 2: Wind -->
            <div
                class="absolute top-[35%] right-6 glass-widget p-3 rounded-xl shadow-soft flex items-center gap-3 animate-[float_5s_ease-in-out_infinite_reverse]">
                <div
                    class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-500">
                    <span class="material-icons text-xl transform rotate-45">air</span>
                </div>
                <div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wide">Wind</p>
                    <p class="text-lg font-bold text-gray-800 dark:text-white">12 kts <span
                            class="text-xs font-normal text-gray-500 dark:text-gray-400">NW</span></p>
                </div>
            </div>
            <!-- Floating Weather Widget 3: Tide -->
            <div
                class="absolute bottom-[45%] left-12 glass-widget p-3 rounded-xl shadow-soft flex items-center gap-3 animate-[float_7s_ease-in-out_infinite_1s]">
                <div
                    class="w-10 h-10 rounded-lg bg-teal-100 dark:bg-teal-900/30 flex items-center justify-center text-teal-600">
                    <span class="material-icons text-xl">waves</span>
                </div>
                <div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wide">Tide</p>
                    <p class="text-lg font-bold text-gray-800 dark:text-white">High</p>
                </div>
            </div>
            <!-- Image Alt Description Placeholder (Required) -->
            <div class="sr-only" data-alt="Stylized nautical map with glowing red route and floating weather widgets">
                Map Visual</div>
        </div>
        <!-- Bottom Content Sheet -->
        <div
            class="relative z-10 bg-background-light dark:bg-background-dark pt-8 pb-10 px-8 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] dark:shadow-none mt-[-2rem]">
            <!-- Progress Indicator -->
            <div class="flex justify-center gap-2 mb-8">
                <div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors"></div>
                <div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors"></div>
                <div class="w-8 h-2 rounded-full bg-primary shadow-glow transition-all"></div>
            </div>
            <!-- Text Content -->
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4 leading-tight">
                    Explore &amp; Master <br /><span class="text-primary">the Seas</span>
                </h1>
                <p class="text-gray-500 dark:text-gray-400 text-base leading-relaxed px-2">
                    Navigate confidently with real-time weather tracking, precision charts, and discover hidden island
                    gems along your route.
                </p>
            </div>
            <!-- Primary Action Button -->
            <a href="../2-auth/login.html"
                class="w-full bg-primary hover:bg-red-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-red-500/30 transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2 group">
                Get Started
                <span class="material-icons text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </a>
            <!-- Decorative Elements (Subtle) -->
            <div
                class="absolute top-4 left-1/2 transform -translate-x-1/2 w-12 h-1 bg-gray-200 dark:bg-gray-800 rounded-full">
            </div>
        </div>
    </div>
    <!-- Animation Keyframes -->
    <style>
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</body>

</html>

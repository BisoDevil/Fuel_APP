<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Edit Profile - Luxury Maritime App</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Theme Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2a1212",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    backgroundImage: {
                        'nautical-pattern': "url('data:image/svg+xml,%3Csvg width=\\'60\\' height=\\'60\\' viewBox=\\'0 0 60 60\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'none\\' fill-rule=\\'evenodd\\'%3E%3Cg fill=\\'%23f50000\\' fill-opacity=\\'0.03\\'%3E%3Cpath d=\\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')",
                    }
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-100 min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary/20 selection:text-primary">
    <!-- Faint Nautical Watermark Background -->
    <div class="fixed inset-0 pointer-events-none bg-nautical-pattern z-0"></div>
    <!-- Main Container (Phone Frame simulation) -->
    <div class="relative z-10 w-full max-w-md mx-auto min-h-screen flex flex-col pb-6">
        <!-- Header -->
        <header
            class="flex items-center justify-between px-6 pt-12 pb-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
            <a href="home.html"
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
            </a>
            <h1 class="text-lg font-bold tracking-wide text-gray-900 dark:text-white uppercase">Edit Profile</h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>
        <!-- Content -->
        <main class="flex-1 px-6 flex flex-col items-center w-full">
            <!-- Avatar Section -->
            <div class="relative mt-4 mb-10 group cursor-pointer">
                <div
                    class="w-28 h-28 rounded-full p-1 border-2 border-primary/20 group-hover:border-primary transition-colors duration-300">
                    <img alt="Profile picture of a distinguished man in a suit"
                        class="w-full h-full object-cover rounded-full shadow-lg"
                        data-alt="Profile picture of a distinguished man in a suit"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtZan1vMOe-UsxZOBZV62NTxvShE18nwNS78zbHyv-2pE362bILWi7rfScxwXyfy4-dpKgdw_vFfESsi1-46A4dq5c7tAriI1IT_2f5FlSlzm7OlhGIlu7ZZM50sIT7yZNyNdGlj-GK8X7QkiZomffaKphRX7XOlJ-VLdfKQ-JZlnTYc_QrofXXjMYmW881Ag7iA35sUNiPPhxaL7Jpx_4Z-xJIC0mDv9-SlaKP0z6FJPSPHdOgrLBU3x5p9IcmR-3JbcAJyE2KlA" />
                </div>
                <button
                    class="absolute bottom-1 right-1 bg-primary text-white p-2 rounded-full shadow-lg hover:bg-red-700 transition-transform active:scale-95 border-4 border-background-light dark:border-background-dark">
                    <span class="material-icons-round text-sm">photo_camera</span>
                </button>
            </div>
            <!-- Form Fields -->
            <form class="w-full space-y-6">
                <!-- First Name -->
                <div class="group">
                    <label
                        class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1"
                        for="firstName">First Name</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-lg px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400 dark:placeholder-gray-600 shadow-sm"
                            id="firstName" type="text" value="Jonathan" />
                        <span
                            class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-primary opacity-0 group-focus-within:opacity-100 transition-opacity text-xl pointer-events-none">edit</span>
                    </div>
                </div>
                <!-- Last Name -->
                <div class="group">
                    <label
                        class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1"
                        for="lastName">Last Name</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-lg px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400 dark:placeholder-gray-600 shadow-sm"
                            id="lastName" type="text" value="Wick" />
                        <span
                            class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-primary opacity-0 group-focus-within:opacity-100 transition-opacity text-xl pointer-events-none">edit</span>
                    </div>
                </div>
                <!-- Email -->
                <div class="group">
                    <label
                        class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1"
                        for="email">Email Address</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-lg px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400 dark:placeholder-gray-600 shadow-sm"
                            id="email" type="email" value="j.wick@continental.com" />
                        <span
                            class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors text-xl pointer-events-none">mail_outline</span>
                    </div>
                </div>
                <!-- Phone -->
                <div class="group">
                    <label
                        class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1"
                        for="phone">Phone Number</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-lg px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400 dark:placeholder-gray-600 shadow-sm"
                            id="phone" type="tel" value="+1 555 0192" />
                        <span
                            class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors text-xl pointer-events-none">phone_iphone</span>
                    </div>
                </div>
                <!-- Country Dropdown -->
                <div class="group">
                    <label
                        class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1"
                        for="country">Country of Residence</label>
                    <div class="relative">
                        <select
                            class="w-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white rounded-lg px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none appearance-none shadow-sm cursor-pointer"
                            id="country">
                            <option selected="" value="monaco">Monaco</option>
                            <option value="us">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="uae">United Arab Emirates</option>
                            <option value="france">France</option>
                            <option value="italy">Italy</option>
                        </select>
                        <span
                            class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 pointer-events-none group-focus-within:rotate-180 transition-transform duration-300">expand_more</span>
                    </div>
                </div>
            </form>
        </main>
        <!-- Footer Action -->
        <footer
            class="mt-8 px-6 pb-6 sticky bottom-0 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent pt-10">
            <button
                class="w-full bg-primary hover:bg-red-700 text-white font-bold py-4 rounded-lg shadow-xl shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 uppercase tracking-wide text-sm">
                <span>Save Changes</span>
                <span class="material-icons-round text-lg">check</span>
            </button>
        </footer>
    </div>
</body>

</html>

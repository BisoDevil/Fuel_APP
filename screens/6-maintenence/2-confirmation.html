<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat"],
                        "sans": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Master</title>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans text-[#1d0c0c] dark:text-white min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-[#2d1414] shadow-xl overflow-x-hidden">
        <!-- Header / Close -->
        <div class="flex items-center p-4 pt-12 justify-between">
            <a href="1-home.html"
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
            </a>
            <h2 class="font-display font-bold text-lg flex-1 text-center pr-10">Booking Details</h2>
        </div>
        <!-- Success Animation/Icon Area -->
        <div class="flex flex-col items-center pt-8 pb-4">
            <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-white text-5xl"
                    style="font-variation-settings: 'wght' 600">check</span>
            </div>
            <h1 class="font-display text-3xl font-bold mt-6 tracking-tight">Booking Confirmed!</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Your refueling slot is secured.</p>
        </div>
        <!-- Booking Details Card -->
        <div class="p-6">
            <div class="bg-background-light dark:bg-[#3d1a1a] rounded-xl p-5 border border-primary/10 shadow-sm">
                <div class="flex items-start gap-4 mb-4">
                    <div class="bg-primary/10 p-2 rounded-lg">
                        <span class="material-symbols-outlined text-primary">location_on</span>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                            Location</p>
                        <p class="font-bold text-base">Port Hercules, Monaco</p>
                    </div>
                </div>
                <div class="flex items-start gap-4 mb-4">
                    <div class="bg-primary/10 p-2 rounded-lg">
                        <span class="material-symbols-outlined text-primary">calendar_today</span>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                            Date &amp; Time</p>
                        <p class="font-bold text-base">Oct 24, 14:15</p>
                    </div>
                </div>
                <div class="pt-4 border-t border-primary/10 flex justify-between items-center">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                            Total Estimate</p>
                        <p class="text-2xl font-display font-bold text-primary">$2,450</p>
                    </div>
                    <div class="bg-primary/5 px-3 py-1 rounded-full border border-primary/20">
                        <span class="text-[10px] font-bold text-primary uppercase">Estimated</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- QR Code Section -->
        <div class="px-6 pb-8 text-center">
            <div class="bg-white dark:bg-white p-4 rounded-xl inline-block shadow-md border-4 border-primary/5">
                <div class="w-48 h-48 bg-center bg-no-repeat bg-contain"
                    data-alt="A scannable QR code for marina check-in"
                    style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBsCYEM8n3FMqqD-E_CtnTlys2Mj61U4ixjNJ83yHSQ2zwXtqsw2LGmfe3nJsIJT9wIuz-qEaNvLbln7GP8PgOAdIWrgPZlwf0amiGDJ16GIm4EcswqtA-kXpnWkm08qU_smozDLOLDh_RYLsSac5sOfbnvmwygBq3YbgVfaihywCmsM0EdFEc3LqHjkJfOyCr7DvKClauBOB0gXQq16dI2BBxlu-k5tibqvnhJ-WMV9_YyHXs5lLMZsoJ5WsP4gcG5rJ3kkJy292M');">
                </div>
            </div>
            <p class="mt-4 text-sm font-medium text-slate-600 dark:text-slate-300">
                Present this code to the marina attendant<br />upon arrival for expedited service.
            </p>
        </div>
        <!-- Action Buttons -->
        <div class="mt-auto p-6 flex flex-col gap-3">
            <button
                class="w-full py-4 rounded-xl border-2 border-primary/20 text-primary font-bold hover:bg-primary/5 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">event</span>
                Add to Calendar
            </button>
            <button
                class="w-full py-4 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">home</span>
                Back to Home
            </button>
        </div>
        <!-- Footer Map Preview -->
        <div class="px-6 pb-6">
            <div class="relative h-32 w-full rounded-xl overflow-hidden grayscale contrast-125 opacity-60">
                <div class="absolute inset-0 bg-center bg-cover" data-alt="Stylized map showing Port Hercules in Monaco"
                    data-location="Monaco"
                    style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFlaw9qP6_CzghTviuJdiX7mxD096bmxfswxLeKjOfaZO5TspzK6Htqy_9Hrvf_tQypkSY7eCXZBaoiSoenUsE2ljICkG-oGcADA7BW_LE_0API0WFG-5fMWBO-21v_OzSYotU_SLnXzl-N8AK8545N8SMEfvV0IngBmQF96errzlHl8kwFw6sZcXvn_1pHTiwMPZ3VMVOXGYvOOjKB9AikNQIoX14IROa5O5JvAGDQoZyA1qATx9FY4gDSwe8r1LUNGQgzsftcA0');">
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-white dark:from-[#2d1414] to-transparent"></div>
            </div>
        </div>
    </div>
</body>

</html>

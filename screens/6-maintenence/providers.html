<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Select Service Provider</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script
        id="tailwind-config">tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#f50000", "primary-dark": "#c20000", "background-light": "#f8f5f5", "background-dark": "#230f0f", "surface-light": "#ffffff", "surface-dark": "#2d1b1b", "neutral-light": "#e5e0e0", "neutral-dark": "#4a3535" }, fontFamily: { display: "Montserrat" }, borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" }, boxShadow: { soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)", "inner-light": "inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)", float: "0 10px 40px -10px rgba(0, 0, 0, 0.1)" } } } };</script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .card-shine {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.2) 100%);
        }

        .glow-pulse {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 20px -5px rgba(245, 0, 0, 0.3);
            }

            to {
                box-shadow: 0 0 30px -5px rgba(245, 0, 0, 0.5);
            }
        }

        .float-in {
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-1 {
            animation-delay: 0.1s;
        }

        .stagger-2 {
            animation-delay: 0.2s;
        }

        .stagger-3 {
            animation-delay: 0.3s;
        }

        .stagger-4 {
            animation-delay: 0.4s;
        }

        .stagger-5 {
            animation-delay: 0.5s;
        }

        .brand-chillout {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
        }

        .brand-mobile {
            background: linear-gradient(135deg, #0066B3 0%, #00A3E0 100%);
        }

        .brand-enpi {
            background: linear-gradient(135deg, #1E88E5 0%, #00ACC1 100%);
        }

        .brand-emarat {
            background: linear-gradient(135deg, #009688 0%, #4CAF50 100%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-100 min-h-screen flex flex-col antialiased selection:bg-primary/20 selection:text-primary">
    <header
        class="px-6 pt-12 pb-4 flex justify-between items-center sticky top-0 z-30 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md">
        <a href="../3-home/home.html"
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
        </a>
        <h1 class="text-base font-semibold tracking-wider uppercase text-gray-900 dark:text-white">Service Provider</h1>
        <div class="w-10 h-10"></div>
    </header>
    <main class="flex-1 px-6 pb-48 pt-2 overflow-y-auto no-scrollbar flex flex-col">
        <section class="flex-1 flex flex-col">
            <div class="flex justify-between items-end mb-6 px-1">
                <h2 class="text-2xl font-light text-gray-900 dark:text-white">Choose <span
                        class="font-bold">Provider</span></h2>
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest pb-1">4 Providers</span>
            </div>

            <div class="mb-8">
                <div class="flex items-center gap-2 mb-4 px-1">
                    <span class="material-symbols-outlined text-primary text-xl">workspace_premium</span>
                    <h2 class="text-sm font-bold uppercase tracking-widest text-gray-900 dark:text-white">Top Rated</h2>
                </div>
                <div class="space-y-4">
                    <button
                        class="w-full relative flex items-center p-5 rounded-2xl bg-gradient-to-br from-white to-gray-50 dark:from-surface-dark dark:to-neutral-dark shadow-lg hover:shadow-xl border-2 border-primary/20 hover:border-primary/50 transition-all duration-300 text-left group float-in stagger-1 glow-pulse">
                        <div
                            class="absolute -top-2.5 -right-2.5 w-16 h-8 bg-gradient-to-r from-amber-400 to-amber-600 rounded-full flex items-center justify-center shadow-lg">
                            <span class="material-symbols-rounded text-amber-100 text-sm">star</span>
                            <span class="text-[10px] font-bold text-white ml-0.5">4.9</span>
                        </div>
                        <div class="relative">
                            <div
                                class="w-16 h-16 rounded-2xl brand-chillout flex items-center justify-center mr-5 shrink-0 shadow-lg">
                                <span class="text-2xl font-bold text-white">1</span>
                            </div>
                            <div
                                class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 rounded-full border-2 border-white dark:border-surface-dark flex items-center justify-center">
                                <span class="material-symbols-rounded text-[10px] text-white">check</span>
                            </div>
                        </div>
                        <div class="flex-1 ml-2">
                            <h3 class="font-bold text-sm text-gray-900 dark:text-white mb-1">Provider #1</h3>
                            <div class="flex items-center gap-2 mb-2">
                                <span
                                    class="text-[10px] font-medium text-primary bg-primary/10 px-2 py-0.5 rounded-full">Verified</span>
                                <span class="text-[10px] text-gray-400">•</span>
                                <span class="text-[10px] text-gray-500 dark:text-gray-400">15 min away</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <div class="flex -space-x-1">
                                    <div
                                        class="w-5 h-5 rounded-full bg-emerald-400 border border-white dark:border-surface-dark">
                                    </div>
                                    <div
                                        class="w-5 h-5 rounded-full bg-blue-400 border border-white dark:border-surface-dark">
                                    </div>
                                    <div
                                        class="w-5 h-5 rounded-full bg-purple-400 border border-white dark:border-surface-dark">
                                    </div>
                                </div>
                                <span class="text-[10px] text-gray-400 ml-1">48+ reviews</span>
                            </div>
                        </div>
                        <span
                            class="material-symbols-outlined text-gray-300 ml-2 group-hover:text-primary transition-colors">chevron_right</span>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <button
                    class="w-full flex items-center p-5 rounded-2xl bg-white dark:bg-surface-dark shadow-md hover:shadow-lg border border-gray-100 dark:border-neutral-dark hover:border-primary/30 transition-all duration-300 group text-left float-in stagger-2">
                    <div class="relative">
                        <div
                            class="w-16 h-16 rounded-2xl brand-mobile flex items-center justify-center mr-5 shrink-0 group-hover:scale-105 transition-transform duration-300">
                            <span class="text-2xl font-bold text-white">2</span>
                        </div>
                        <div
                            class="absolute -bottom-1 -right-1 w-5 h-5 bg-amber-400 rounded-full border-2 border-white dark:border-surface-dark flex items-center justify-center">
                            <span class="material-symbols-rounded text-[10px] text-white">star</span>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-1">
                            <h3
                                class="font-bold text-gray-900 dark:text-white group-hover:text-primary transition-colors">
                                Provider #2</h3>
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-rounded text-amber-400 text-sm">star</span>
                                <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">4.7</span>
                            </div>
                        </div>
                        <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-2">Premium vessel maintenance
                            specialists</p>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">schedule</span>
                                20 min
                            </span>
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">location_on</span>
                                2.3 nm
                            </span>
                        </div>
                    </div>
                </button>

                <button
                    class="w-full flex items-center p-5 rounded-2xl bg-white dark:bg-surface-dark shadow-md hover:shadow-lg border border-gray-100 dark:border-neutral-dark hover:border-primary/30 transition-all duration-300 group text-left float-in stagger-3">
                    <div class="relative">
                        <div
                            class="w-16 h-16 rounded-2xl brand-enpi flex items-center justify-center mr-5 shrink-0 group-hover:scale-105 transition-transform duration-300">
                            <span class="text-2xl font-bold text-white">3</span>
                        </div>
                        <div
                            class="absolute -bottom-1 -right-1 w-5 h-5 bg-amber-400 rounded-full border-2 border-white dark:border-surface-dark flex items-center justify-center">
                            <span class="material-symbols-rounded text-[10px] text-white">star</span>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-1">
                            <h3
                                class="font-bold text-gray-900 dark:text-white group-hover:text-primary transition-colors">
                                Provider #3</h3>
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-rounded text-amber-400 text-sm">star</span>
                                <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">4.5</span>
                            </div>
                        </div>
                        <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-2">Engine specialists with 20+ years
                            experience</p>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">schedule</span>
                                25 min
                            </span>
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">location_on</span>
                                3.1 nm
                            </span>
                        </div>
                    </div>
                </button>

                <button
                    class="w-full flex items-center p-5 rounded-2xl bg-white dark:bg-surface-dark shadow-md hover:shadow-lg border border-gray-100 dark:border-neutral-dark hover:border-primary/30 transition-all duration-300 group text-left float-in stagger-4">
                    <div class="relative">
                        <div
                            class="w-16 h-16 rounded-2xl brand-emarat flex items-center justify-center mr-5 shrink-0 group-hover:scale-105 transition-transform duration-300">
                            <span class="text-2xl font-bold text-white">4</span>
                        </div>
                        <div
                            class="absolute -bottom-1 -right-1 w-5 h-5 bg-amber-400 rounded-full border-2 border-white dark:border-surface-dark flex items-center justify-center">
                            <span class="material-symbols-rounded text-[10px] text-white">star</span>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-1">
                            <h3
                                class="font-bold text-gray-900 dark:text-white group-hover:text-primary transition-colors">
                                Provider #4</h3>
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-rounded text-amber-400 text-sm">star</span>
                                <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">4.3</span>
                            </div>
                        </div>
                        <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-2">24/7 emergency response available
                        </p>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">schedule</span>
                                10 min
                            </span>
                            <span class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">location_on</span>
                                0.8 nm
                            </span>
                        </div>
                    </div>
                </button>
            </div>

            <div class="mt-8 p-4 rounded-2xl bg-gradient-to-r from-primary/10 to-transparent border border-primary/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
                        <span class="material-symbols-rounded text-primary">info</span>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-900 dark:text-white">Need help choosing?</p>
                        <p class="text-[10px] text-gray-500 dark:text-gray-400">Our AI can recommend the best provider
                            based on your vessel and needs.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div class="fixed bottom-10 left-6 right-6 z-40">
        <a href="1-home.html"
            class="w-full h-16 bg-primary hover:bg-primary-dark text-white rounded-3xl shadow-2xl shadow-primary/30 font-bold tracking-widest uppercase text-sm transition-all transform active:scale-[0.97] flex items-center justify-center group">
            <span class="mr-2">Continue</span>
            <span class="w-1.5 h-1.5 bg-white/40 rounded-full mx-2"></span>
            <span class="font-medium opacity-90 lowercase first-letter:uppercase">Provider #1</span>
            <span
                class="material-symbols-outlined ml-3 text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </a>
    </div>
    <div
        class="fixed bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/80 dark:via-background-dark/80 to-transparent pointer-events-none z-30">
    </div>
</body>

</html>

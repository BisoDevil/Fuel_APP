<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    rel="stylesheet" />

<body
  class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-100 min-h-screen flex justify-center selection:bg-primary/20 selection:text-primary">
  <div class="w-full max-w-md bg-white dark:bg-[#1a0b0b] min-h-screen shadow-2xl relative flex flex-col">
    <header
      class="px-6 pt-8 pb-4 bg-white dark:bg-[#1a0b0b] sticky top-0 z-10 border-b border-gray-100 dark:border-red-900/10">
      <div class="flex items-center justify-between mb-6">
        <button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-red-900/20 transition-colors">
          <span class="material-icons-outlined text-gray-800 dark:text-gray-200">arrow_back</span>
        </button>
        <div class="text-xs font-bold tracking-widest text-gray-400 dark:text-gray-500 uppercase">Step 2 of 4</div>
        <button class="text-sm font-semibold text-primary hover:text-red-600 transition-colors">Save Draft</button>
      </div>
      <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2 tracking-tight">Technical Specs</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Define the vessel's dimensions and power.</p>
      <div class="flex gap-2 mt-6">
        <div class="h-1.5 flex-1 rounded-xl bg-primary/40 dark:bg-primary/30"></div>
        <div class="h-1.5 flex-1 rounded-xl bg-primary shadow-[0_0_10px_rgba(245,0,0,0.4)]"></div>
        <div class="h-1.5 flex-1 rounded-xl bg-gray-200 dark:bg-gray-800"></div>
        <div class="h-1.5 flex-1 rounded-xl bg-gray-200 dark:bg-gray-800"></div>
      </div>
    </header>
    <main class="flex-1 px-6 py-6 overflow-y-auto no-scrollbar pb-32">
      <section class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Length
              (ft)</label>
            <input
              class="w-full px-5 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium placeholder-gray-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none"
              inputmode="decimal" placeholder="00.0" type="number" />
          </div>
          <div>
            <label
              class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Beam
              (ft)</label>
            <input
              class="w-full px-5 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium placeholder-gray-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none"
              inputmode="decimal" placeholder="00.0" type="number" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Draft
              (ft)</label>
            <input
              class="w-full px-5 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium placeholder-gray-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none"
              inputmode="decimal" placeholder="0.0" type="number" />
          </div>
          <div>
            <label
              class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Gross
              Tonnage</label>
            <input
              class="w-full px-5 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium placeholder-gray-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none"
              placeholder="GT" type="number" />
          </div>
        </div>
        <div>
          <label
            class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Engine
            Type</label>
          <div class="relative">
            <select
              class="w-full pl-5 pr-10 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm appearance-none cursor-pointer outline-none">
              <option disabled="" selected="" value="">Select Engine Configuration</option>
              <option value="inboard_diesel">Inboard Diesel</option>
              <option value="inboard_gas">Inboard Gas</option>
              <option value="outboard_4s">Outboard 4-Stroke</option>
              <option value="outboard_2s">Outboard 2-Stroke</option>
              <option value="jet_drive">Jet Drive</option>
              <option value="electric">Electric / Hybrid</option>
            </select>
            <span class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-primary">
              <span class="material-icons-outlined">expand_more</span>
            </span>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 ml-1 uppercase tracking-wide">Fuel
            Capacity</label>
          <div class="relative">
            <select
              class="w-full pl-5 pr-10 py-4 rounded-xl bg-white dark:bg-[#2a1515] border border-gray-200 dark:border-red-900/30 text-gray-900 dark:text-white font-medium focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm appearance-none cursor-pointer outline-none">
              <option disabled="" selected="" value="">Select Range</option>
              <option value="under_500">Under 500 Gal</option>
              <option value="500_1000">500 - 1,000 Gal</option>
              <option value="1000_2000">1,000 - 2,000 Gal</option>
              <option value="2000_5000">2,000 - 5,000 Gal</option>
              <option value="5000_plus">5,000+ Gal</option>
            </select>
            <span class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-primary">
              <span class="material-icons-outlined">local_gas_station</span>
            </span>
          </div>
        </div>
        <div
          class="bg-gray-50 dark:bg-[#230f0f] border border-gray-100 dark:border-red-900/20 p-5 rounded-xl flex gap-4 mt-6">
          <span class="material-icons-outlined text-primary mt-0.5">info</span>
          <div>
            <h4 class="font-bold text-gray-900 dark:text-white text-sm">Why accurate specs matter?</h4>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 leading-relaxed">Buyers filter extensively by draft
              and range. Accurate data ensures your yacht appears in the right searches.</p>
          </div>
        </div>
      </section>
    </main>
    <footer
      class="absolute bottom-0 left-0 w-full p-6 bg-white/80 dark:bg-[#1a0b0b]/90 backdrop-blur-md border-t border-gray-100 dark:border-red-900/10 z-20">
      <button
        class="w-full bg-primary hover:bg-red-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-red-500/30 transform transition-all active:scale-[0.98] flex items-center justify-center gap-3 group">
        <span>Next Step</span>
        <span class="bg-white/20 rounded-full p-1 group-hover:translate-x-1 transition-transform">
          <span class="material-icons-outlined text-sm">arrow_forward</span>
        </span>
      </button>
    </footer>
  </div>
</body>

</html>

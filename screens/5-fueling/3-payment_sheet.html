<body
    class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 antialiased min-h-screen pb-6 flex flex-col">
    <header
        class="fixed top-0 w-full z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md px-6 pt-12 pb-4 flex justify-between items-center">
        <a href="2-complete.html"
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
        </a>
        <h1 class="text-lg font-bold text-gray-900 dark:text-white">Checkout</h1>
        <div class="w-10 h-10"></div>
    </header>
    <main class="pt-24 px-6 flex-grow flex flex-col">
        <section class="mb-8">
            <div
                class="bg-surface-light dark:bg-surface-dark rounded-3xl p-8 shadow-sm flex flex-col items-center justify-center text-center relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-50/50 dark:to-white/5 pointer-events-none">
                </div>
                <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">
                    Refueling Total</h2>
                <div class="relative z-10">
                    <span class="text-5xl font-bold text-primary tracking-tight">$2,450</span>
                </div>
                <div class="mt-4 mb-6">
                    <span
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-primary text-xs font-bold rounded-lg border border-red-100 dark:border-red-900/30">
                        <span class="material-symbols-outlined text-sm">local_gas_station</span>
                        Premium Diesel
                    </span>
                </div>
                <p class="text-xs text-gray-400 dark:text-gray-500">Includes all local taxes &amp; port fees</p>
            </div>
        </section>
        <section class="flex-grow">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-5">Payment Method</h2>
            <div class="space-y-4">
                <label
                    class="relative flex items-center justify-between p-4 rounded-2xl bg-white dark:bg-surface-dark border-2 border-primary shadow-sm cursor-pointer transition-all group">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-full bg-gray-50 dark:bg-gray-800 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-2xl">credit_card</span>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 dark:text-white">Visa ending in 8892</p>
                            <p class="text-xs text-gray-500">Expires 12/25</p>
                        </div>
                    </div>
                    <input checked=""
                        class="radio-custom h-6 w-6 border-2 border-gray-300 text-primary focus:ring-primary"
                        name="payment_method" type="radio" />
                </label>
                <label
                    class="relative flex items-center justify-between p-4 rounded-2xl bg-white dark:bg-surface-dark border border-transparent shadow-sm hover:shadow-md cursor-pointer transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-black flex items-center justify-center text-white">
                            <span class="font-bold text-xs tracking-tighter">Pay</span>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 dark:text-white">Apple Pay</p>
                            <p class="text-xs text-gray-500">Fast &amp; Secure</p>
                        </div>
                    </div>
                    <input class="radio-custom h-6 w-6 border-2 border-gray-300 text-primary focus:ring-primary"
                        name="payment_method" type="radio" />
                </label>
                <label
                    class="relative flex items-center justify-between p-4 rounded-2xl bg-white dark:bg-surface-dark border border-transparent shadow-sm hover:shadow-md cursor-pointer transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-2xl">account_balance_wallet</span>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 dark:text-white">Yacht Wallet</p>
                            <p class="text-xs text-gray-500">Instant &amp; Secure</p>
                        </div>
                    </div>
                    <input class="radio-custom h-6 w-6 border-2 border-gray-300 text-primary focus:ring-primary"
                        name="payment_method" type="radio" />
                </label>
            </div>
        </section>
        <div class="mt-8 pb-8 safe-area-pb">
            <div class="flex items-center justify-center gap-2 mb-6 text-gray-400 dark:text-gray-500">
                <span class="material-symbols-outlined text-sm">lock</span>
                <span class="text-xs font-medium">128-bit SSL Secured Connection</span>
            </div>
            <a href="4-receipt.html"
                class="w-full bg-primary hover:bg-red-700 text-white font-bold text-lg py-4 px-6 rounded-2xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
                Pay &amp; Confirm Booking
                <span class="material-symbols-rounded">arrow_forward</span>
            </a>
        </div>
    </main>
    <style>
        .safe-area-pb {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
</body>

</html>

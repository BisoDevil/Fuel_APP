<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fueling</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="../../_src/unified-styles.css" rel="stylesheet">
    <link href="../../_src/output.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f50000",
                        "primary-dark": "#c20000",
                        "primary-50": "#fff0f0",
                        "background-light": "#f8f5f5",
                        "background-dark": "#120808",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1E1E1E"
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        sans: ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem"
                    },
                    boxShadow: {
                        soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        glow: "0 4px 20px -2px rgba(245, 0, 0, 0.3)"
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(245, 0, 0, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(245, 0, 0, 0.6)); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .progress-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-ring-circle { transition: stroke-dashoffset 0.3s ease-out; }
        .glow-pulse { animation: pulse-glow 2s ease-in-out infinite; }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .btn-active { background: linear-gradient(135deg, #f50000 0%, #c20000 100%); box-shadow: 0 0 30px rgba(245, 0, 0, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 0.75rem; }
        .glass-panel-dark { background: rgba(42, 18, 18, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; }
    </style>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light nautical-lines dark:bg-background-dark text-slate-800 dark:text-slate-100 font-sans min-h-screen flex justify-center selection:bg-primary/20">
    <!-- Mobile Container -->
    <div class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden">
        <!-- Background Effect -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/10 rounded-full blur-[120px]">
            </div>
            <div
                class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-white dark:from-[#1a0a0a] to-transparent">
            </div>
        </div>

        <!-- Header -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center relative z-10">
            <a href="../4-booking/4-fuel-start-qr.html"
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
            </a>
            <div class="text-center">
                <h1 class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest">Station 12
                </h1>
                <p class="text-xs text-primary">Premium 95</p>
            </div>
            <div class="w-10 h-10"></div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col items-center px-6 relative z-10">
            <!-- Progress Circle -->
            <div class="relative w-72 h-72 mb-8 glow-pulse">
                <!-- Outer decorative ring -->
                <svg class="absolute inset-0 w-full h-full -rotate-12" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(245, 0, 0, 0.1)" stroke-width="1" />
                    <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(245, 0, 0, 0.05)" stroke-width="0.5"
                        stroke-dasharray="5 5" />
                </svg>

                <!-- Progress Ring -->
                <svg class="absolute inset-0 w-full h-full progress-ring" viewBox="0 0 200 200">
                    <!-- Background -->
                    <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(0, 0, 0, 0.05)" stroke-width="8"
                        class="dark:stroke-white/5" />
                    <!-- Progress (starts at 0%) -->
                    <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gradient)" stroke-width="8"
                        stroke-linecap="round" stroke-dasharray="534" stroke-dashoffset="534"
                        class="progress-ring-circle" />
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f50000" />
                            <stop offset="100%" stop-color="#c20000" />
                        </linearGradient>
                    </defs>
                </svg>

                <!-- Center Content -->
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div class="text-center">
                        <span id="liters" class="text-6xl font-bold font-display tracking-tighter">0.0</span>
                        <span class="text-xl text-slate-400 ml-1">L</span>
                    </div>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="material-symbols-outlined text-primary text-sm animate-pulse">local_gas_station</span>
                        <span id="percentage" class="text-sm text-slate-400">0%</span>
                    </div>
                </div>
            </div>

            <!-- Price & Info -->
            <div class="w-full glass-panel dark:glass-panel-dark rounded-2xl p-4 mb-8">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary">local_gas_station</span>
                        </div>
                        <div>
                            <p class="font-semibold text-slate-900 dark:text-white">Premium 95</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400">Octane Rating: 95</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-display text-xl font-bold text-primary">€1.80</p>
                        <p class="text-xs text-slate-400">per liter</p>
                    </div>
                </div>
            </div>
            <!-- Stats Grid -->
            <div class="w-full grid grid-cols-3 gap-3 mb-8">
                <div class="glass-panel dark:glass-panel-dark rounded-2xl p-4 text-center">
                    <span class="material-symbols-outlined text-primary text-lg mb-1">schedule</span>
                    <p class="text-xs text-slate-500 mb-1">Duration</p>
                    <p id="duration" class="font-display text-lg font-semibold">04:32</p>
                </div>
                <div class="glass-panel dark:glass-panel-dark rounded-2xl p-4 text-center">
                    <span class="material-symbols-outlined text-primary text-lg mb-1">speed</span>
                    <p class="text-xs text-slate-500 mb-1">Flow Rate</p>
                    <p class="font-display text-lg font-semibold">42<span
                            class="text-xs text-slate-400 ml-0.5">L/min</span></p>
                </div>
                <div class="glass-panel dark:glass-panel-dark rounded-2xl p-4 text-center">
                    <span class="material-symbols-outlined text-primary text-lg mb-1">euro</span>
                    <p class="text-xs text-slate-500 mb-1">Cost</p>
                    <p id="cost" class="font-display text-lg font-semibold">€58.32</p>
                </div>
            </div>
        </main>

        <!-- Control Section -->
        <div class="p-6 pt-0 relative z-10">
            <!-- Status Indicator -->
            <div class="flex justify-center mb-6">
                <div
                    class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 border border-primary/20">
                    <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                    <span class="text-sm font-medium text-primary">Fueling in Progress</span>
                </div>
            </div>

            <!-- Controls -->
            <button class="w-full btn-active text-white font-semibold py-3 px-5 rounded-lg transition-all active:scale-[0.98]">
                PAUSE
            </button>
        </div>
    </div>

    <script>
        // Fueling simulation
        const PRICE_PER_LITER = 1.80;
        const FLOW_RATE = 0.70; // liters per second (42 L/min)
        const UPDATE_INTERVAL = 100; // update every 100ms for smooth animation

        let progress = 0;
        let liters = 0;
        let totalCost = 0;
        let secondsElapsed = 0;
        let isFueling = true;
        let targetLiters = 50; // tank capacity

        function formatDuration(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            // Update progress circle
            const circle = document.querySelector('.progress-ring-circle');
            const circumference = 2 * Math.PI * 85;
            const offset = circumference - (progress / 100) * circumference;
            circle.style.strokeDashoffset = offset;

            // Update liters display
            document.getElementById('liters').textContent = liters.toFixed(1);
            document.getElementById('percentage').textContent = Math.round(progress) + '%';

            // Update duration
            document.getElementById('duration').textContent = formatDuration(secondsElapsed);

            // Update cost
            document.getElementById('cost').textContent = '€' + totalCost.toFixed(2);

            // Update button state when complete
            if (progress >= 100) {
                const btn = document.querySelector('.btn-active');
                if (btn) {
                    btn.textContent = 'DONE';
                    btn.classList.remove('btn-active');
                    btn.classList.add('bg-green-600');
                }

                const statusText = document.querySelector('.text-sm.font-medium');
                if (statusText) {
                    statusText.textContent = 'Fueling Complete';
                    statusText.classList.remove('text-primary');
                    statusText.classList.add('text-green-600');
                }

                const pulseDot = document.querySelector('.w-2');
                if (pulseDot) {
                    pulseDot.classList.remove('bg-primary', 'animate-pulse');
                    pulseDot.classList.add('bg-green-600');
                }
            }
        }

        // Simulation loop
        setInterval(() => {
            if (isFueling && progress < 100) {
                secondsElapsed++;
                liters += FLOW_RATE;
                totalCost = liters * PRICE_PER_LITER;
                progress = Math.min((liters / targetLiters) * 100, 100);

                updateDisplay();
            }
        }, 1000);

        // Pause/Resume functionality
        document.querySelector('.btn-active').addEventListener('click', function () {
            if (progress >= 100) return;

            isFueling = !isFueling;
            this.textContent = isFueling ? 'PAUSE' : 'RESUME';

            const statusText = document.querySelector('.text-sm.font-medium');
            statusText.textContent = isFueling ? 'Fueling in Progress' : 'Fueling Paused';

            const pulseDot = document.querySelector('.w-2');
            if (isFueling) {
                pulseDot.classList.add('animate-pulse');
            } else {
                pulseDot.classList.remove('animate-pulse');
            }
        });
    </script>
</body>

</html>

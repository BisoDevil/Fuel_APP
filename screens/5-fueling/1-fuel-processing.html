<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Master</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#b30000",
                        "primary-glow": "rgba(245, 0, 0, 0.6)",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                        "surface-dark": "#2a1212",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'wave': 'wave 4s linear infinite',
                    },
                    keyframes: {
                        wave: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        .liquid-container {
            box-shadow: 0 0 40px -10px rgba(245, 0, 0, 0.3);
        }

        .liquid-fill {
            background: linear-gradient(180deg, rgba(245, 0, 0, 0.8) 0%, rgba(180, 0, 0, 0.9) 100%);
            box-shadow: 0 0 30px rgba(245, 0, 0, 0.5) inset;
        }

        .wave-surface {
            background: url('data:image/svg+xml;utf8,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"%3E%3Cpath d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%23FFFFFF"%3E%3C/path%3E%3Cpath d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%23FFFFFF"%3E%3C/path%3E%3Cpath d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%23FFFFFF"%3E%3C/path%3E%3C/svg%3E');
            background-size: 200% 100%;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        .slider-thumb {
            box-shadow: 0 0 15px rgba(245, 0, 0, 0.6);
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light text-slate-800 font-display min-h-screen flex flex-col relative overflow-hidden">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>

    <!-- Ambient Background Glows -->
    <div
        class="absolute top-[-10%] left-[-10%] w-[50%] h-[40%] rounded-full bg-primary/10 blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[50%] rounded-full bg-primary/5 blur-[120px] pointer-events-none">
    </div>

    <!-- Header -->
    <header class="px-6 pt-12 pb-4 flex justify-between items-center z-10">
        <a href="1-fuel.html"
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <span class="material-symbols-rounded text-gray-800 dark:text-white">arrow_back_ios_new</span>
        </a>
        <div class="text-center">
            <h1 class="text-sm font-semibold tracking-widest uppercase text-slate-500">Refueling</h1>
            <p class="text-slate-900 font-medium">Port Starboard</p>
        </div>
        <button
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-md flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <span class="material-symbols-rounded text-gray-800 dark:text-white">settings</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-between px-6 pb-8 relative z-10 w-full max-w-md mx-auto">
        <!-- Status Badge -->
        <div
            class="mt-4 mb-2 flex items-center space-x-2 bg-primary/10 px-4 py-1.5 rounded-full border border-primary/20 animate-pulse-slow">
            <div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#f50000]"></div>
            <span class="text-xs font-semibold tracking-wider text-primary uppercase">Active Pump: #04</span>
        </div>

        <!-- Central Visualization Container -->
        <div class="relative w-full flex-1 flex flex-col items-center justify-center my-6">
            <!-- Percentage Hero -->
            <div class="absolute top-[15%] z-20 text-center">
                <div class="text-6xl font-bold text-slate-900 drop-shadow-[0_0_15px_rgba(245,0,0,0.5)]">64<span
                        class="text-3xl align-top text-primary">%</span></div>
                <div class="text-sm text-slate-500 tracking-widest mt-1">COMPLETED</div>
            </div>

            <!-- The Fluid Cylinder -->
            <div
                class="relative w-48 h-[380px] rounded-[40px] bg-slate-100 border border-slate-200 liquid-container overflow-hidden p-1">
                <!-- Inner bezel/track -->
                <div
                    class="absolute inset-0 rounded-[40px] shadow-[inset_0_0_20px_rgba(0,0,0,0.1)] z-10 pointer-events-none">
                </div>

                <!-- Measurement ticks -->
                <div
                    class="absolute right-4 top-10 bottom-10 w-4 flex flex-col justify-between items-end z-20 opacity-30">
                    <div class="w-3 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-3 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-3 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-1.5 h-[1px] bg-slate-600"></div>
                    <div class="w-3 h-[1px] bg-slate-600"></div>
                </div>

                <!-- Liquid Fill -->
                <div
                    class="absolute bottom-0 left-0 right-0 h-[64%] liquid-fill transition-all duration-1000 ease-in-out rounded-b-[36px]">
                    <!-- Wave Animation Top -->
                    <div class="absolute top-[-15px] left-0 w-[200%] h-[30px] wave-surface animate-wave"></div>

                    <!-- Bubbles/Particles inside liquid -->
                    <div class="absolute inset-0 overflow-hidden opacity-30">
                        <div
                            class="absolute bottom-10 left-4 w-1 h-1 bg-white rounded-full animate-[pulse_2s_infinite]">
                        </div>
                        <div
                            class="absolute bottom-20 right-8 w-2 h-2 bg-white rounded-full animate-[pulse_3s_infinite]">
                        </div>
                        <div
                            class="absolute bottom-40 left-10 w-1.5 h-1.5 bg-white rounded-full animate-[pulse_2.5s_infinite]">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating Data readout (Volume Dispensed) -->
            <div class="absolute bottom-[5%] glass-panel px-6 py-3 rounded-xl flex flex-col items-center">
                <span class="text-slate-500 text-xs font-medium uppercase tracking-wider mb-1">Dispensed</span>
                <span class="text-2xl font-bold text-slate-900 tracking-wide">3,200 <span
                        class="text-primary text-sm font-normal">L</span></span>
            </div>
        </div>

        <!-- Metrics Grid -->
        <div class="w-full grid grid-cols-2 gap-4 mb-8">
            <!-- Card 1: Cost -->
            <div class="glass-panel p-4 rounded-xl flex flex-col border-l-2 border-l-primary">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-xs uppercase tracking-wider">Current Cost</span>
                    <span class="material-symbols-outlined text-slate-300 text-sm">attach_money</span>
                </div>
                <div class="text-2xl font-bold text-primary drop-shadow-[0_0_8px_rgba(245,0,0,0.4)]">$5,420</div>
                <div class="text-xs text-slate-400 mt-1">@ $1.69 / L</div>
            </div>

            <!-- Card 2: Target -->
            <div class="glass-panel p-4 rounded-xl flex flex-col">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-xs uppercase tracking-wider">Target Vol</span>
                    <span class="material-symbols-outlined text-slate-300 text-sm">local_gas_station</span>
                </div>
                <div class="text-2xl font-bold text-slate-900">5,000 <span
                        class="text-sm font-normal text-slate-500">L</span></div>
                <div class="text-xs text-slate-400 mt-1">~12 min remaining</div>
            </div>
        </div>

        <!-- Slide to Stop Action -->
        <div
            class="w-full relative h-16 rounded-full bg-slate-100 border border-slate-200 flex items-center p-1 overflow-hidden group">
            <a href="./2-complete.html">
                <!-- Track Text -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
                    <span
                        class="text-slate-400 font-medium tracking-widest text-sm uppercase group-hover:text-slate-500 transition-colors">Slide
                        to Stop &amp; Pay</span>
                    <div class="absolute right-6 opacity-30 animate-pulse">
                        <span class="material-symbols-outlined text-slate-500 text-lg">chevron_right</span>
                    </div>
                </div>

                <!-- Progress Track (Visual) -->
                <div
                    class="absolute left-0 top-0 bottom-0 bg-primary/20 w-16 rounded-full opacity-0 group-active:opacity-100 transition-opacity">
                </div>

                <!-- Draggable Thumb -->
                <div
                    class="h-14 w-14 rounded-full bg-primary flex items-center justify-center relative z-10 shadow-[0_0_20px_rgba(245,0,0,0.5)] cursor-pointer transform transition-transform active:scale-95 slider-thumb">
                    <span class="material-symbols-outlined text-white font-bold">close</span>
                </div>
            </a>

        </div>
    </main>
</body>

</html>

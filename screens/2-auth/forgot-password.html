<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../_src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-800 dark:text-white">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>
    <!-- Main Container - Mobile Phone Form Factor -->
    <div class="w-full max-w-md px-8 py-10 relative z-10 flex flex-col h-full justify-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4">
                <span class="material-icons text-primary text-5xl">lock_reset</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">MARITIMA</h1>
            <p class="text-sm text-slate-500 mt-1 tracking-widest uppercase text-[0.65rem]">Premium Yacht Management</p>
        </div>

        <!-- Forgot Password Form -->
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Forgot Password?</h2>
            <p class="text-sm text-slate-500">Enter your email address and we'll send you instructions to reset your
                password.</p>
        </div>

        <form class="space-y-6" action="forgot-password-confirmation.html">
            <!-- Email Input -->
            <div class="relative group">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 ml-1"
                    for="email">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span
                            class="material-icons text-slate-400 text-xl group-focus-within:text-primary transition-colors">mail_outline</span>
                    </div>
                    <input
                        class="block w-full pl-12 pr-4 py-3.5 bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                        id="email" placeholder="captain@vessel.com" type="email" />
                </div>
            </div>

            <!-- Submit Button -->
            <button
                class="w-full bg-primary hover:bg-red-700 text-white font-bold py-4 px-4 rounded-lg shadow-lg shadow-primary/30 transition-all duration-300 transform active:scale-[0.98] mt-4 flex items-center justify-center space-x-2"
                type="submit">
                <span>SEND RESET LINK</span>
                <span class="material-icons text-sm">send</span>
            </button>
        </form>

        <!-- Back to Login -->
        <div class="mt-8 text-center">
            <a href="login.html"
                class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-primary transition-colors">
                <span class="material-icons text-lg mr-1">arrow_back</span>
                Back to Login
            </a>
        </div>
    </div>
</body>

</html>

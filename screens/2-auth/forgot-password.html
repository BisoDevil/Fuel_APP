<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Forgot Password - MASTER</title>
    <link href="_src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f50000",
                        "primary-dark": "#c20000",
                        "primary-50": "#fff0f0",
                        "background-light": "#f8f5f5",
                        "background-dark": "#120808",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1E1E1E"
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        sans: ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem"
                    },
                    boxShadow: {
                        soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        glow: "0 4px 20px -2px rgba(245, 0, 0, 0.3)"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-800 dark:text-white">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>
    <!-- Main Container - Mobile Phone Form Factor -->
    <div class="w-full max-w-md px-8 py-10 relative z-10 flex flex-col h-full justify-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
            <div
                class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4 dark:border-slate-800 shadow-md">
                <svg class="w-18 h-18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="smooth" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="0.5" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <text x="50" y="50" dy=".35em" fill="#f50000" stroke="white" stroke-width="9" stroke-linecap="round"
                        stroke-linejoin="round" paint-order="stroke" filter="url(#smooth)"
                        font-family="Montserrat, sans-serif" font-weight="bold" font-size="60"
                        text-anchor="middle">M</text>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-red-700 dark:text-white">MASTER</h1>
            <p class="text-sm text-slate-500 mt-1 tracking-widest uppercase text-[0.65rem]">Smart Fuel services</p>
        </div>

        <!-- Forgot Password Form -->
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Forgot Password?</h2>
            <p class="text-sm text-slate-500">Enter your email address and we'll send you instructions to reset your
                password.</p>
        </div>

        <form class="space-y-6" action="forgot-password-confirmation.html">
            <!-- Email Input -->
            <div class="relative group">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 ml-1"
                    for="email">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span
                            class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary transition-colors">mail_outline</span>
                    </div>
                    <input
                        class="block w-full pl-12 pr-4 py-3.5 bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                        id="email" placeholder="captain@vessel.com" type="email" />
                </div>
            </div>

            <!-- Submit Button -->
            <button class="btn-primary w-full justify-center" type="submit">
                <span>SEND RESET LINK</span>
                <span class="material-symbols-outlined text-sm">send</span>
            </button>
        </form>

        <!-- Back to Login -->
        <div class="mt-8 text-center">
            <a href="login.html"
                class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-primary transition-colors">
                <span class="material-symbols-rounded text-lg mr-1">arrow_back_ios_new</span>
                Back to Login
            </a>
        </div>
    </div>
</body>

</html>

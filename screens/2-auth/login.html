<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f50000",
                        "primary-dark": "#c20000",
                        "primary-50": "#fff0f0",
                        "background-light": "#f8f5f5",
                        "background-dark": "#120808",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1E1E1E",
                        "card-dark": "#2C2C2C"
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        sans: ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        glow: "0 4px 20px -2px rgba(245, 0, 0, 0.3)"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-800 dark:text-white">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>
    <!-- Main Container - Mobile Phone Form Factor -->
    <div class="w-full max-w-md px-8 py-10 relative z-10 flex flex-col h-full justify-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
            <div
                class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4 dark:border-slate-800 shadow-md">
                <svg class="w-18 h-18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="smooth" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="0.5" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <text x="50" y="50" dy=".35em" fill="#f50000" stroke="white" stroke-width="9" stroke-linecap="round"
                        stroke-linejoin="round" paint-order="stroke" filter="url(#smooth)"
                        font-family="Montserrat, sans-serif" font-weight="bold" font-size="60"
                        text-anchor="middle">M</text>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-red-700 dark:text-white">MASTER</h1>
            <p class="text-sm text-slate-500 mt-1 tracking-widest uppercase text-[0.65rem]">Smart Fuel services</p>
        </div>
        <!-- Login Form -->
        <form class="space-y-6">
            <!-- Email Input -->
            <div class="relative group">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 ml-1"
                    for="email">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span
                            class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary transition-colors">mail_outline</span>
                    </div>
                    <input
                        class="block w-full pl-12 pr-4 py-3 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                        id="email" placeholder="captain@vessel.com" type="email" />
                </div>
            </div>
            <!-- Password Input -->
            <div class="relative group">
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider"
                        for="password">Password</label>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span
                            class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-primary transition-colors">lock_outline</span>
                    </div>
                    <input
                        class="block w-full pl-12 pr-12 py-3 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                        id="password" placeholder="••••••••" type="password" />
                    <button
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined text-xl">visibility_off</span>
                    </button>
                </div>
                <div class="flex justify-end mt-2">
                    <a class="text-sm font-medium text-primary hover:text-red-700 transition-colors"
                        href="forgot-password.html">Forgot
                        Password?</a>
                </div>
            </div>
            <!-- Submit Button -->
            <a href="../3-home/home.html"
                class="bg-[#f50000] hover:bg-[#c20000] text-white font-bold text-[15px] px-5 py-3 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 w-full flex items-center justify-center gap-2">
                <span>SIGN IN</span>
                <span class="material-symbols-rounded text-sm">arrow_forward</span>
            </a>
        </form>
        <!-- Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-background-light dark:bg-background-dark text-slate-400">Or continue with</span>
            </div>
        </div>
        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3">
            <button
                class="bg-white dark:bg-surface-dark text-gray-700 dark:text-white font-medium text-sm px-4 py-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 hover:border-[#f50000] transition-all duration-200 w-full flex items-center justify-center gap-2"
                type="button">
                <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                <span>Google</span>
            </button>
            <button
                class="bg-white dark:bg-surface-dark text-gray-700 dark:text-white font-medium text-sm px-4 py-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 hover:border-[#f50000] transition-all duration-200 w-full flex items-center justify-center gap-2"
                type="button">
                <svg class="h-5 w-5 text-gray-900 dark:text-white" fill="currentColor" viewbox="0 0 24 24">
                    <path
                        d="M17.05 20.28c-.98.95-2.05.88-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.24.75-.62 1.58-1.22 2.53-.01 0-1.28 1.52-1.31 1.55zm-1.3-13.9c-1.77 1.57-2.6 1.54-2.78 1.56.08-2.73 2.73-5.91 5.3-5.93.28 2.73-1.73 5.41-2.52 4.37z">
                    </path>
                </svg>
                <span>Apple</span>
            </button>
        </div>
        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-sm text-slate-500">
                Don't have an account?
                <a class="font-bold text-primary hover:text-red-700 ml-1 transition-colors"
                    href="register.html">Register</a>
            </p>
        </div>
    </div>
</body>

</html>

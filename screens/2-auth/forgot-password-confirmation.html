<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding - Seamless Logistics</title>
    <link href="../../_src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-dark": "#c20000",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-800 dark:text-white">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>

    <!-- Main Container -->
    <div class="w-full max-w-md px-8 py-10 relative z-10 flex flex-col h-full justify-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4">
                <span class="material-icons text-primary text-5xl">sailing</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">MARITIMA</h1>
            <p class="text-sm text-slate-500 mt-1 tracking-widest uppercase text-[0.65rem]">Premium Yacht Management</p>
        </div>

        <!-- Content Container -->
        <div class="flex flex-col items-center">
            <!-- Email Icon -->
            <div class="relative mb-14 mt-6">
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-primary/5 rounded-full border border-primary/10">
                </div>
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28 bg-primary/10 rounded-full blur-md">
                </div>
                <div
                    class="relative w-20 h-20 rounded-full bg-primary/10 border border-white/10 flex items-center justify-center z-10">
                    <span class="material-icons text-primary text-5xl">mark_email_unread</span>
                    <div
                        class="absolute top-0 right-0 w-5 h-5 bg-primary rounded-full border-[3px] border-background-light dark:border-background-dark">
                    </div>
                </div>
            </div>

            <!-- Text Content -->
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">Check Your Inbox</h2>
                <p class="text-sm text-slate-500 leading-relaxed max-w-[280px]">
                    We've sent a password reset link to your email address.
                </p>
            </div>

            <!-- Open Email Button -->
            <a href="mailto:"
                class="w-full bg-primary hover:bg-red-700 text-white font-bold py-4 px-4 rounded-lg shadow-lg shadow-primary/30 transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center space-x-2 mb-6">
                <span>Open Email App</span>
                <span class="material-icons text-sm">open_in_new</span>
            </a>

            <!-- Resend Email -->
            <button
                class="text-xs text-slate-400 hover:text-primary dark:hover:text-primary transition-colors font-medium flex items-center gap-1.5 mb-8"
                type="button">
                <span class="material-icons text-base">refresh</span>
                Resend Email
            </button>
        </div>

        <!-- Back to Login -->
        <div class="mt-auto text-center">
            <a href="login.html"
                class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors text-sm font-semibold">
                <span class="material-icons text-lg">arrow_back</span>
                Back to Login
            </a>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Master</title>
    <link href="../../src/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f50000",
                        "primary-dark": "#c20000",
                        "primary-50": "#fff0f0",
                        "background-light": "#f8f5f5",
                        "background-dark": "#120808",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1E1E1E"
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        sans: ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem"
                    },
                    boxShadow: {
                        soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        glow: "0 4px 20px -2px rgba(245, 0, 0, 0.3)"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-800 dark:text-white">
    <!-- Nautical Background Watermark -->
    <div class="absolute inset-0 nautical-lines nautical-watermark pointer-events-none z-0"></div>

    <!-- Main Container -->
    <div class="w-full max-w-md px-8 py-10 relative z-10 flex flex-col h-full justify-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
            <div
                class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4 dark:border-slate-800 shadow-md">
                <svg class="w-18 h-18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="smooth" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="0.5" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <text x="50" y="50" dy=".35em" fill="#f50000" stroke="white" stroke-width="9" stroke-linecap="round"
                        stroke-linejoin="round" paint-order="stroke" filter="url(#smooth)"
                        font-family="Montserrat, sans-serif" font-weight="bold" font-size="60"
                        text-anchor="middle">M</text>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-red-700 dark:text-white">MASTER</h1>
            <p class="text-sm text-slate-500 mt-1 tracking-widest uppercase text-[0.65rem]">Smart Fuel services</p>
        </div>

        <!-- Content Container -->
        <div class="flex flex-col items-center">
            <!-- Email Icon -->
            <div class="relative mb-14 mt-6">
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-primary/5 rounded-full border border-primary/10">
                </div>
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28 bg-primary/10 rounded-full blur-md">
                </div>
                <div
                    class="relative w-20 h-20 rounded-full bg-primary/10 border border-white/10 flex items-center justify-center z-10">
                    <span class="material-symbols-outlined text-primary text-5xl">mark_email_unread</span>
                    <div
                        class="absolute top-0 right-0 w-5 h-5 bg-primary rounded-full border-[3px] border-background-light dark:border-background-dark">
                    </div>
                </div>
            </div>

            <!-- Text Content -->
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">Check Your Inbox</h2>
                <p class="text-sm text-slate-500 leading-relaxed max-w-[280px]">
                    We've sent a password reset link to your email address.
                </p>
            </div>

            <!-- Open Email Button -->
            <a href="mailto:" class="btn-primary w-full justify-center mb-6">
                <span>Open Email App</span>
                <span class="material-symbols-outlined text-sm">open_in_new</span>
            </a>

            <!-- Resend Email -->
            <button
                class="text-xs text-slate-400 hover:text-primary dark:hover:text-primary transition-colors font-medium flex items-center gap-1.5 mb-8"
                type="button">
                <span class="material-symbols-outlined text-base">refresh</span>
                Resend Email
            </button>
        </div>

        <!-- Back to Login -->
        <div class="mt-auto text-center">
            <a href="login.html"
                class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors text-sm font-semibold">
                <span class="material-symbols-rounded text-lg">arrow_back_ios_new</span>
                Back to Login
            </a>
        </div>
    </div>
</body>

</html>

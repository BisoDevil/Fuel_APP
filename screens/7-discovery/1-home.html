<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Places to Sail - Discovery V1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@20..48,100..700,0..1"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f50000",
                        "primary-soft": "#fef2f2",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                        "neutral-dark": "#3d3030",
                        "neutral-medium": "#8a7a7a",
                        "neutral-light": "#e3dcdc",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(245, 0, 0, 0.05)',
                        'nav': '0 -4px 20px rgba(0,0,0,0.05)',
                    }
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            min-height: 100dvh;
        }
    </style>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-neutral-dark dark:text-neutral-light font-display antialiased selection:bg-primary selection:text-white min-h-screen flex flex-col relative">
    <header
        class="px-6 pt-12 pb-6 flex flex-col gap-6 sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm transition-colors duration-300">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-sm font-medium text-neutral-medium dark:text-gray-400">Welcome aboard</p>
                <h1 class="text-2xl font-bold text-neutral-dark dark:text-white mt-0.5">Where to next, Captain?</h1>
            </div>

        </div>
    </header>
    <main class="px-6 flex flex-col gap-6 pb-12">
        <div class="relative group cursor-pointer active:scale-[0.99] transition-transform duration-300">
            <div class="absolute top-4 right-4 z-10">
                <button
                    class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/40 transition-colors text-white">
                    <span class="material-symbols-outlined text-xl">favorite_border</span>
                </button>
            </div>
            <div class="absolute top-4 left-4 z-10">
                <span
                    class="px-3 py-1.5 rounded-full bg-primary/90 backdrop-blur-sm text-white text-xs font-bold tracking-wide shadow-sm flex items-center gap-1">
                    <span class="material-symbols-outlined text-[10px]">near_me</span>
                    12nm
                </span>
            </div>
            <div class="h-[420px] w-full rounded-2xl overflow-hidden relative shadow-lg shadow-neutral-dark/10">
                <img alt="Aerial view of the dramatic coastline of Capri Italy with boats in turquoise water"
                    class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700"
                    src="https://instagram.faly1-2.fna.fbcdn.net/v/t39.30808-6/480535474_520288524430834_2580783443473263412_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=108&ig_cache_key=MzUwMjg3MzQ3NzU1MjA5MTE2NA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjk2MHg5NjAuc2RyLkMzIn0%3D&_nc_ohc=jbn6bRs0yccQ7kNvwE8H8w3&_nc_oc=AdmQPMsFagbpdzwV0cGd_glV_1UnkGEAjGdAW9OornojwwUa1R3otJ1cem4n9ko90Xw&_nc_ad=z-m&_nc_cid=1337&_nc_zt=23&_nc_ht=instagram.faly1-2.fna&_nc_gid=jbiVQrzJTWqLh-8kgwK8ag&_nc_ss=8&oh=00_AfwG_fDVm2wC8yLM6Aa5s9xZKf6JbWch569sW-jIk7qAZA&oe=69BD037A" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/10"></div>
                <div class="absolute bottom-0 left-0 w-full p-6 text-white">
                    <div class="flex justify-between items-end mb-1">
                        <div>
                            <p class="text-sm font-medium text-white/80 uppercase tracking-widest mb-1">Hurghada, Egypt
                            </p>
                            <h2 class="text-3xl font-bold">Tawila Island</h2>
                        </div>
                        <div class="flex items-center gap-1 bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg">
                            <span class="material-symbols-outlined text-yellow-400 text-sm">star</span>
                            <span class="text-sm font-bold">4.9</span>
                        </div>
                    </div>
                    <p class="text-sm text-white/70 line-clamp-2 mt-2 font-light">
                        Famous for its rugged landscape, upscale hotels and shopping, from designer fashions to
                        limoncello and handmade leather sandals.
                    </p>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="relative group cursor-pointer active:scale-[0.98] transition-transform duration-300">
                <div class="absolute top-3 right-3 z-10">
                    <button
                        class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/40 transition-colors">
                        <span class="material-symbols-outlined text-primary text-lg">favorite</span>
                    </button>
                </div>
                <div class="aspect-square w-full rounded-2xl overflow-hidden relative shadow-lg shadow-neutral-dark/5">
                    <img alt="Sunset view over white architecture in Santorini Greece with calm sea"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
                        src="https://lh3.googleusercontent.com/gps-cs-s/AHVAweq1RaIxwJ7P0wNRkpUh7ZfGhBOqXLSE2Tvowo00T7KPocA4V9Fqc4qU5o3p_LB64nxrZJQ7o7XQ3oe77zL0ODn8vjj1fZ3L2OnWOdOf8DP0UOpGsmQdttXKJPBRHaNci-JiwpSI=s1360-w1360-h1020-rw" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                    <div class="absolute bottom-0 left-0 w-full p-3 text-white">

                        <h3 class="text-base font-bold leading-tight">Mahmia</h3>
                        <div class="flex items-center gap-1 mt-1">
                            <span class="material-symbols-outlined text-yellow-400 text-xs">star</span>
                            <span class="text-xs font-bold">4.8</span>
                            <span class="text-[10px] text-white/60 ml-1">• 45nm</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="relative group cursor-pointer active:scale-[0.98] transition-transform duration-300">
                <div class="absolute top-3 right-3 z-10">
                    <button
                        class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/40 transition-colors">
                        <span class="material-symbols-outlined text-white text-lg">favorite_border</span>
                    </button>
                </div>
                <div class="aspect-square w-full rounded-2xl overflow-hidden relative shadow-lg shadow-neutral-dark/5">
                    <img alt="Colorful houses of Cinque Terre Italy on cliffside overlooking the sea"
                        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
                        src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/23/d9/12/e3/overview-of-paradise.jpg?w=1200&h=-1&s=1" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                    <div class="absolute bottom-0 left-0 w-full p-3 text-white">

                        <h3 class="text-base font-bold leading-tight">Paradise</h3>
                        <div class="flex items-center gap-1 mt-1">
                            <span class="material-symbols-outlined text-yellow-400 text-xs">star</span>
                            <span class="text-xs font-bold">4.7</span>
                            <span class="text-[10px] text-white/60 ml-1">• 82nm</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex justify-center pt-4">
            <button
                class="text-sm font-semibold text-primary hover:text-red-700 transition-colors flex items-center gap-2 px-6 py-3 rounded-xl bg-primary/5">
                Explore All Destinations
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </div>
    </main>

</body>

</html>
